<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="app">
        <div class="status-card">
            <p class="eyebrow">Latest Prompt</p>
            <p class="score" id="prompt-score">--</p>
            <p class="tags" id="prompt-tags">Refresh a supported chatbot tab after loading the extension.</p>
        </div>
        <a href="http://localhost:3000/metrics" class="site-button" target="_blank" rel="noreferrer">Open Metrics Page</a>
    </div>
    <script src="popup.js"></script>
</body>
</html>
